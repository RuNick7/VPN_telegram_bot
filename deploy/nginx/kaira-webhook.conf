# KairaVPN YooKassa webhook reverse proxy.
# Размещается в /etc/nginx/sites-available/kaira-webhook
# и линкуется в /etc/nginx/sites-enabled/.
#
# Пускаем только POST /webhook-yookassa с известных IP YooKassa.
# Всё остальное закрываем 444 (молча рвём соединение), чтобы сканеры
# не ходили по /api/route, /robots.txt и т.п.

# IP YooKassa (актуально на 2025-04, проверяйте https://yookassa.ru/developers/using-api/webhooks).
geo $yookassa_allowed {
    default 0;
    185.71.76.0/27   1;
    185.71.77.0/27   1;
    77.75.153.0/25   1;
    77.75.154.128/25 1;
    77.75.156.11/32  1;
    77.75.156.35/32  1;
    2a02:5180::/32   1;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name webhook.example.com;

    # certbot/letsencrypt:
    ssl_certificate     /etc/letsencrypt/live/webhook.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webhook.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Лимит размера тела (YooKassa шлёт несколько КБ).
    client_max_body_size 64k;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # Защита: всё, что не /webhook-yookassa POST -> 444.
    location = /webhook-yookassa {
        if ($request_method != POST) { return 444; }
        if ($yookassa_allowed = 0)   { return 444; }

        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout    15s;
        proxy_read_timeout    25s;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 3s;
        access_log off;
    }

    location / {
        return 444;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name webhook.example.com;
    return 301 https://$host$request_uri;
}
