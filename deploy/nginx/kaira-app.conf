# KairaVPN web cabinet — единый домен app.kairavpn.pro.
# /api/*  -> FastAPI на 127.0.0.1:8001 (kaira-web-api.service)
# всё остальное -> Next.js на 127.0.0.1:3000 (kaira-web.service)
#
# Webhook ЮKassa живёт на отдельном домене (kaira-webhook.conf), сюда не лезет.
# Symlink: /etc/nginx/sites-available/kaira-app -> /etc/nginx/sites-enabled/kaira-app

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.kairavpn.pro;

    ssl_certificate     /etc/letsencrypt/live/app.kairavpn.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.kairavpn.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 1m;
    client_body_timeout 20s;
    client_header_timeout 20s;

    # Service Worker должен иметь правильный scope. Отдаём с no-store, чтобы
    # обновления SW подхватывались сразу.
    location = /sw.js {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Manifest и иконки PWA — длинный кэш.
    location = /manifest.webmanifest {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 7d;
        access_log off;
    }
    location ~ ^/(apple-touch-icon\.png|favicon\.ico)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 30d;
        access_log off;
    }

    # Internal-эндпоинты вызываются user_bot'ом по 127.0.0.1:8001 напрямую,
    # поэтому снаружи закрываем 444.
    location ^~ /api/internal/ {
        return 444;
    }

    # Новый webhook YooKassa на FastAPI не используется (остался старый
    # webhook.kaira.yet.moe → user_bot:8000). Закрываем, чтобы сканеры не лезли.
    location ^~ /api/payments/webhook/ {
        return 444;
    }

    # Публичное API → FastAPI на 8001
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout    25s;
        proxy_read_timeout    25s;
    }

    # Кэш статики Next.js (immutable бандлы)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 1y;
        access_log off;
    }
    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1d;
    }

    # Иконки и прочая статика из public/icons/
    location /icons/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 30d;
        access_log off;
    }

    # Всё остальное → Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout    25s;
        proxy_read_timeout    25s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name app.kairavpn.pro;
    return 301 https://$host$request_uri;
}
